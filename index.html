<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portfolio-blindado</title>

  <!-- integração de bloqueio VOLTZ - Desenvolvido por VOLTZ Soluções -->
  <script>
    (function () {

      // ============================================================
      // ⚡ CONFIGURAÇÃO — só mexa aqui
      // ============================================================

      // CPF ou CNPJ do cliente (só números, sem ponto, traço ou barra)
      var VOLTZ_DOCUMENTO = '05674768390';

      // URL do backend VOLTZ (não mude se estiver no Render padrão)
      var VOLTZ_BACKEND = 'https://api-voltz-sistema-de-pagamentos.onrender.com';

      // ============================================================
      // ⚙️ LÓGICA — não precisa mexer abaixo desta linha
      // ============================================================

      // Remove qualquer pontuação que o CPF/CNPJ possa ter
      var doc = VOLTZ_DOCUMENTO.replace(/\D/g, '');

      // Consulta o backend para saber se o cliente está em dia
      fetch(VOLTZ_BACKEND + '/api/api/site-status/' + encodeURIComponent(doc))
        .then(function (res) { return res.json(); })
        .then(function (data) {
          // Se o status for "bloqueado", trava o site
          if (data.status === 'bloqueado') {
            bloquearSite(data.atraso || 0);
          }
          // Se for "ativo" ou der erro na resposta, o site carrega normalmente
        })
        .catch(function () {
          // Erro de rede = benefício da dúvida, site não é bloqueado
        });

      // ============================================================
      // 🚫 TELA DE BLOQUEIO — aparece quando há 10+ dias de atraso
      // ============================================================
      function bloquearSite(diasAtraso) {

        // Impede o scroll da página original atrás da tela
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';

        // Cria o elemento que vai cobrir o site inteiro
        var overlay = document.createElement('div');
        overlay.id = 'voltz-bloqueio-overlay';

        overlay.innerHTML = [
          '<style>',
          '  #voltz-bloqueio-overlay {',
          '    position: fixed;',
          '    top: 0; left: 0; right: 0; bottom: 0;',
          '    background: #0a0a14;',
          '    z-index: 2147483647;', /* maior z-index possível */
          '    display: flex;',
          '    flex-direction: column;',
          '    align-items: center;',
          '    justify-content: center;',
          '    padding: 20px;',
          '    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;',
          '    box-sizing: border-box;',
          '  }',
          '  #voltz-bloqueio-overlay * { box-sizing: border-box; margin: 0; padding: 0; }',
          '  .vb-logo {',
          '    display: flex; align-items: center; gap: 10px;',
          '    margin-bottom: 36px;',
          '    font-size: 26px; font-weight: 900;',
          '    color: #FFD700; letter-spacing: -1px;',
          '  }',
          '  .vb-card {',
          '    background: #16162a;',
          '    border: 1px solid #f1416c;',
          '    border-radius: 20px;',
          '    padding: 40px 36px;',
          '    max-width: 500px;',
          '    width: 100%;',
          '    text-align: center;',
          '    box-shadow: 0 0 60px rgba(241,65,108,0.12);',
          '  }',
          '  .vb-icone {',
          '    width: 72px; height: 72px;',
          '    background: rgba(241,65,108,0.1);',
          '    border-radius: 50%;',
          '    display: flex; align-items: center; justify-content: center;',
          '    margin: 0 auto 22px;',
          '    font-size: 34px;',
          '  }',
          '  .vb-titulo {',
          '    color: #f1416c;',
          '    font-size: 20px; font-weight: 900;',
          '    text-transform: uppercase; letter-spacing: 2px;',
          '    margin-bottom: 14px;',
          '  }',
          '  .vb-texto {',
          '    color: #aaa;',
          '    font-size: 15px; line-height: 1.65;',
          '    margin-bottom: 24px;',
          '  }',
          '  .vb-destaque { color: #f1416c; font-weight: bold; }',
          '  .vb-box-dias {',
          '    background: rgba(241,65,108,0.08);',
          '    border: 1px solid rgba(241,65,108,0.25);',
          '    border-radius: 10px;',
          '    padding: 16px 20px;',
          '    margin-bottom: 26px;',
          '  }',
          '  .vb-box-dias span {',
          '    display: block;',
          '    font-size: 11px; color: #888;',
          '    text-transform: uppercase; letter-spacing: 1px;',
          '    margin-bottom: 6px;',
          '  }',
          '  .vb-box-dias strong {',
          '    color: #f1416c;',
          '    font-size: 32px; font-weight: 900;',
          '  }',
          '  .vb-btn {',
          '    display: inline-flex; align-items: center; gap: 8px;',
          '    background: #25D366; color: white;',
          '    padding: 13px 28px;',
          '    border-radius: 10px;',
          '    text-decoration: none;',
          '    font-weight: bold; font-size: 15px;',
          '    transition: transform 0.2s;',
          '  }',
          '  .vb-btn:hover { transform: scale(1.04); }',
          '  .vb-rodape {',
          '    margin-top: 28px;',
          '    color: #555; font-size: 12px; line-height: 1.6;',
          '  }',
          '  .vb-rodape a { color: #009ef7; text-decoration: none; }',
          '</style>',

          /* LOGO VOLTZ */
          '<div class="vb-logo">',
          '  <svg width="26" height="26" viewBox="0 0 24 24" fill="#FFD700">',
          '    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
          '  </svg>',
          '  VOLTZ',
          '</div>',

          /* CARD PRINCIPAL */
          '<div class="vb-card">',

          '  <div class="vb-icone">&#9940;</div>',

          '  <div class="vb-titulo">Site Suspenso</div>',

          '  <p class="vb-texto">',
          '    Este site foi <span class="vb-destaque">temporariamente suspenso</span>',
          '    por pendências financeiras com a',
          '    <span style="color:#FFD700;font-weight:bold"> VOLTZ Soluções</span>.',
          '    <br><br>',
          '    Se você é o proprietário, regularize seus pagamentos para',
          '    reativar o acesso imediatamente.',
          '  </p>',

          '  <div class="vb-box-dias">',
          '    <span>dias em atraso</span>',
          '    <strong>' + diasAtraso + '</strong>',
          '  </div>',

          '  <a class="vb-btn"',
          '     href="https://wa.me/5586999830819?text=Preciso+regularizar+meu+site+com+a+VOLTZ"',
          '     target="_blank" rel="noreferrer">',
          '    &#128242; Regularizar Agora',
          '  </a>',

          '  <div class="vb-rodape">',
          '    Gerenciado por',
          '    <a href="https://gestao-adriano.vercel.app" target="_blank">',
          '      VOLTZ Solu&#231;&#245;es Integradas',
          '    </a>',
          '    <br>',
          '    Ap&#243;s o pagamento, o acesso &#233; restaurado automaticamente.',
          '  </div>',

          '</div>'
        ].join('\n');

        // Injeta a tela no topo do body assim que o DOM estiver pronto
        if (document.body) {
          document.body.appendChild(overlay);
        } else {
          document.addEventListener('DOMContentLoaded', function () {
            document.body.appendChild(overlay);
          });
        }
      }

    })();
  </script>
  <!-- integração de bloqueio VOLTZ - Desenvolvido por VOLTZ Soluções -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
